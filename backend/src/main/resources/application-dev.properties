# Logging
quarkus.log.category."com.sergio".level=DEBUG

# NO JSON en local
quarkus.log.console.json.enabled=false

quarkus.log.console.format=%d{HH:mm:ss} %-5p [%X{requestId}] %c{2} - %m%n

# Request logs
quarkus.http.access-log.enabled=false

# Datasource
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/barber_booking

# Hibernate
quarkus.hibernate-orm.log.format-sql=true

# Liquibase
quarkus.liquibase.migrate-at-start=true

# CORS
quarkus.http.cors.origins=https://7254-185-137-143-180.ngrok-free.app
#quarkus.http.cors.origins=http://localhost:3000

# Frontend
app.frontend.url=https://7254-185-137-143-180.ngrok-free.app
#app.frontend.url=http://localhost:3000

# Backend
app.backend.url=https://5d39-185-137-143-180.ngrok-free.app
#app.backend.url=http://localhost:8080

# Cookies
app.cookies.secure=true

# Redis
quarkus.redis.hosts=redis://localhost:6379

