# Logging
quarkus.log.level=INFO

quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ

# app logs
quarkus.log.category."com.sergio".level=INFO

# request logs
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern="%r" %s %Dms

# Datasource
quarkus.datasource.db-kind=postgresql

# liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# cors
quarkus.http.cors.enabled=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true