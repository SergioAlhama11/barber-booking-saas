# datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/barber_booking}

# hibernate
quarkus.hibernate-orm.database.generation=none
# quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.format-sql=true

# liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# CORS (FRONTEND)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*

# quarkus.mailer.mock=false
# quarkus.mailer.from=no-reply@barbershop.com
# quarkus.mailer.host=localhost
# quarkus.mailer.port=1025
# quarkus.mailer.start-tls=DISABLED
# quarkus.mailer.auth-methods=none

# Frontend
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# entorno
app.env=${APP_ENV:dev}

# brevo
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:no-reply@trimly.com}
brevo.sender.name=${BREVO_SENDER_NAME:Trimly}
