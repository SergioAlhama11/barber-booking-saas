# datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/barber_booking

# hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.format-sql=true

# liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# CORS (FRONTEND)
quarkus.http.cors.enabled=true
# quarkus.http.cors.origins=http://localhost:3000,http://192.168.18.212:3000,http://192.168.18.159:3000
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*

quarkus.mailer.mock=false
quarkus.mailer.from=no-reply@barbershop.com
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.start-tls=DISABLED
quarkus.mailer.auth-methods=none

app.frontend.url=http://localhost:3000

quarkus.redis.hosts=redis://localhost:6379