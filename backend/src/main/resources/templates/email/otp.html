<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#020617; font-family:Arial, sans-serif;">

<span style="display:none; opacity:0; color:transparent;">
Tu código de acceso a Barber Booking
</span>

<table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
    <tr>
        <td align="center">

            <table width="100%" cellpadding="0" cellspacing="0"
                   style="max-width:520px; background:#111827; border-radius:14px; padding:24px;">

                <!-- HEADER -->
                <tr>
                    <td align="center" style="padding-bottom:12px;">
                        <h2 style="margin:0; color:#ffffff;">💈 Barber Booking</h2>
                    </td>
                </tr>

                <!-- TITLE -->
                <tr>
                    <td style="color:#ffffff; font-size:18px; font-weight:bold; padding-bottom:12px;">
                        Código de verificación
                    </td>
                </tr>

                <!-- TEXT -->
                <tr>
                    <td style="color:#d1d5db; font-size:14px;">
                        Usa este código para acceder a tus citas:
                    </td>
                </tr>

                <!-- OTP -->
                <tr>
                    <td align="center" style="padding:24px 0;">
                        <div style="font-size:32px; font-weight:bold; letter-spacing:8px; color:#ffffff;">
                            {{code}}
                        </div>
                    </td>
                </tr>

                <!-- INFO -->
                <tr>
                    <td style="text-align:center; font-size:12px; color:#9ca3af;">
                        El código caduca en 5 minutos.<br/>
                        Si no solicitaste este acceso, puedes ignorar este mensaje.
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
